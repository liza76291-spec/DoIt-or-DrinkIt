<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Вызов и Наказание — игра для компании</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <h1>ВЫЗОВ / НАКАЗАНИЕ</h1>
            <p>тяни карту · выполняй или пей</p>
        </div>

        <div class="swipe-area" id="swipeArea">
            <div class="card-stack" id="cardStack"></div>
            <div class="swipe-hint">
                ↺ свайпни карту в любую сторону ↻
            </div>
        </div>

        <div class="stats">
            Карт осталось: <span id="cardsLeft">120</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
